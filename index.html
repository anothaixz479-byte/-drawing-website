   <div class="bg-slate-800 rounded-2xl p-6 max-w-sm mx-4 shadow-2xl">
    <h3 class="text-xl font-semibold text-white mb-3">🗑️ ล้างผ้าใบ?</h3>
    <p class="text-slate-300 mb-6">คุณแน่ใจหรือไม่ว่าต้องการล้างภาพวาดทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้</p>
    <div class="flex gap-3"><button id="cancelClear" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl transition-colors">ยกเลิก</button> <button id="confirmClear" class="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl transition-colors">ล้างเลย</button>

  <script>
    const defaultConfig = {
      app_title: '🎨 Drawing Canvas',
      primary_color: '#6366f1',
      background_color: '#0f172a',
      surface_color: '#1e293b',
      text_color: '#ffffff',
      accent_color: '#22c55e'
    };

    let config = { ...defaultConfig };

    // Canvas setup
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentTool = 'brush';
    let currentColor = '#000000';
    let brushSize = 5;
    let brushOpacity = 1;
    let isDashed = false;
    let isFilled = false;
    let startX, startY;
    let tempCanvas, tempCtx;

    // History for undo/redo
    let history = [];
    let historyIndex = -1;
    const maxHistory = 50;

    // Tool names in Thai
    const toolNames = {
      brush: 'พู่กัน',
      pencil: 'ดินสอ',
      marker: 'ปากกาเมจิก',
      spray: 'สเปรย์',
      eraser: 'ยางลบ',
      fill: 'เติมสี',
      line: 'เส้นตรง',
      rectangle: 'สี่เหลี่ยม',
      circle: 'วงกลม',
      triangle: 'สามเหลี่ยม'
    };

    function resizeCanvas() {
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      
      // Save current drawing
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      // Fill with white background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Restore drawing
      ctx.putImageData(imageData, 0, 0);
      
      // Update temp canvas
      tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCtx = tempCanvas.getContext('2d');
      
      document.getElementById('canvasSize').textContent = `${Math.round(canvas.width)} × ${Math.round(canvas.height)} px`;
      
      saveState();
    }

    function saveState() {
      // Remove future states if we're not at the end
      if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
      }
      
      // Add current state
      history.push(canvas.toDataURL());
      
      // Limit history size
      if (history.length > maxHistory) {
        history.shift();
      } else {
        historyIndex++;
      }
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        loadState(history[historyIndex]);
      }
    }

    function redo() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        loadState(history[historyIndex]);
      }
    }

    function loadState(dataUrl) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = dataUrl;
    }

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function startDrawing(e) {
      e.preventDefault();
      isDrawing = true;
      const pos = getMousePos(e);
      lastX = pos.x;
      lastY = pos.y;
      startX = pos.x;
      startY = pos.y;

      if (currentTool === 'fill') {
        floodFill(Math.floor(pos.x), Math.floor(pos.y), currentColor);
        saveState();
        isDrawing = false;
        return;
      }

      if (['line', 'rectangle', 'circle', 'triangle'].includes(currentTool)) {
        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(canvas, 0, 0);
      }
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      
      const pos = getMousePos(e);

      if (['line', 'rectangle', 'circle', 'triangle'].includes(currentTool)) {
        // Restore original canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(tempCanvas, 0, 0);
        
        // Draw shape preview
        drawShape(startX, startY, pos.x, pos.y);
      } else {
        drawFreehand(pos.x, pos.y);
      }
      
      lastX = pos.x;
      lastY = pos.y;
    }

    function drawFreehand(x, y) {
      ctx.globalAlpha = brushOpacity;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      if (currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.strokeStyle = 'rgba(0,0,0,1)';
        ctx.lineWidth = brushSize;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      } else if (currentTool === 'spray') {
        const density = brushSize * 2;
        for (let i = 0; i < density; i++) {
          const offsetX = (Math.random() - 0.5) * brushSize * 2;
          const offsetY = (Math.random() - 0.5) * brushSize * 2;
          const distance = Math.sqrt(offsetX * offsetX + offsetY * offsetY);
          if (distance <= brushSize) {
            ctx.fillStyle = currentColor;
            ctx.fillRect(x + offsetX, y + offsetY, 1, 1);
          }
        }
      } else if (currentTool === 'marker') {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = brushSize * 2;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      } else if (currentTool === 'pencil') {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = Math.max(1, brushSize / 3);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      } else {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = brushSize;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      
      ctx.globalAlpha = 1;
    }

    function drawShape(x1, y1, x2, y2) {
      ctx.globalAlpha = brushOpacity;
      ctx.strokeStyle = currentColor;
      ctx.fillStyle = currentColor;
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      if (isDashed) {
        ctx.setLineDash([10, 10]);
      } else {
        ctx.setLineDash([]);
      }

      ctx.beginPath();
      
      if (currentTool === 'line') {
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      } else if (currentTool === 'rectangle') {
        const width = x2 - x1;
        const height = y2 - y1;
        if (isFilled) {
          ctx.fillRect(x1, y1, width, height);
        }
        ctx.strokeRect(x1, y1, width, height);
      } else if (currentTool === 'circle') {
        const radiusX = Math.abs(x2 - x1) / 2;
        const radiusY = Math.abs(y2 - y1) / 2;
        const centerX = Math.min(x1, x2) + radiusX;
        const centerY = Math.min(y1, y2) + radiusY;
        ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
        if (isFilled) {
          ctx.fill();
        }
        ctx.stroke();
      } else if (currentTool === 'triangle') {
        const midX = (x1 + x2) / 2;
        ctx.moveTo(midX, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x1, y2);
        ctx.closePath();
        if (isFilled) {
          ctx.fill();
        }
        ctx.stroke();
      }
      
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    function stopDrawing() {
      if (isDrawing) {
        isDrawing = false;
        saveState();
      }
    }

    // Flood fill algorithm
    function floodFill(startX, startY, fillColor) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const width = canvas.width;
      const height = canvas.height;
      
      const startPos = (startY * width + startX) * 4;
      const startR = data[startPos];
      const startG = data[startPos + 1];
      const startB = data[startPos + 2];
      
      // Convert hex to RGB
      const fillR = parseInt(fillColor.slice(1, 3), 16);
      const fillG = parseInt(fillColor.slice(3, 5), 16);
      const fillB = parseInt(fillColor.slice(5, 7), 16);
      
      // Don't fill if same color
      if (startR === fillR && startG === fillG && startB === fillB) return;
      
      const stack = [[startX, startY]];
      const visited = new Set();
      
      while (stack.length > 0) {
        const [x, y] = stack.pop();
        const key = `${x},${y}`;
        
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        if (visited.has(key)) continue;
        
        const pos = (y * width + x) * 4;
        const r = data[pos];
        const g = data[pos + 1];
        const b = data[pos + 2];
        
        // Check if color matches (with tolerance)
        const tolerance = 32;
        if (Math.abs(r - startR) > tolerance || 
            Math.abs(g - startG) > tolerance || 
            Math.abs(b - startB) > tolerance) continue;
        
        visited.add(key);
        
        data[pos] = fillR;
        data[pos + 1] = fillG;
        data[pos + 2] = fillB;
        data[pos + 3] = 255;
        
        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }
      
      ctx.putImageData(imageData, 0, 0);
    }

    // Event listeners
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);

    // Tool selection
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
        document.getElementById('currentTool').textContent = toolNames[currentTool];
      });
    });

    // Color selection
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentColor = swatch.dataset.color;
        document.getElementById('currentColorPreview').style.background = currentColor;
      });
    });

    document.getElementById('customColor').addEventListener('input', (e) => {
      currentColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      document.getElementById('currentColorPreview').style.background = currentColor;
    });

    // Brush size
    document.getElementById('brushSize').addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      document.getElementById('sizeValue').textContent = brushSize;
      document.getElementById('footerSize').textContent = brushSize + 'px';
      const preview = document.getElementById('sizePreview');
      preview.style.width = Math.min(brushSize, 50) + 'px';
      preview.style.height = Math.min(brushSize, 50) + 'px';
    });

    // Opacity
    document.getElementById('brushOpacity').addEventListener('input', (e) => {
      brushOpacity = parseInt(e.target.value) / 100;
      document.getElementById('opacityValue').textContent = e.target.value;
    });

    // Line style
    document.getElementById('solidLine').addEventListener('click', () => {
      isDashed = false;
      document.getElementById('solidLine').classList.add('bg-indigo-600');
      document.getElementById('solidLine').classList.remove('bg-slate-700');
      document.getElementById('dashedLine').classList.remove('bg-indigo-600');
      document.getElementById('dashedLine').classList.add('bg-slate-700');
    });

    document.getElementById('dashedLine').addEventListener('click', () => {
      isDashed = true;
      document.getElementById('dashedLine').classList.add('bg-indigo-600');
      document.getElementById('dashedLine').classList.remove('bg-slate-700');
      document.getElementById('solidLine').classList.remove('bg-indigo-600');
      document.getElementById('solidLine').classList.add('bg-slate-700');
    });

    // Fill option
    document.getElementById('noFill').addEventListener('click', () => {
      isFilled = false;
      document.getElementById('noFill').classList.add('bg-indigo-600');
      document.getElementById('noFill').classList.remove('bg-slate-700');
      document.getElementById('yesFill').classList.remove('bg-indigo-600');
      document.getElementById('yesFill').classList.add('bg-slate-700');
    });

    document.getElementById('yesFill').addEventListener('click', () => {
      isFilled = true;
      document.getElementById('yesFill').classList.add('bg-indigo-600');
      document.getElementById('yesFill').classList.remove('bg-slate-700');
      document.getElementById('noFill').classList.remove('bg-indigo-600');
      document.getElementById('noFill').classList.add('bg-slate-700');
    });

    // Background color
    document.getElementById('applyBg').addEventListener('click', () => {
      const bgColor = document.getElementById('bgColor').value;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
    });

    // Undo/Redo
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    // Clear canvas modal
    const clearModal = document.getElementById('clearModal');
    document.getElementById('clearBtn').addEventListener('click', () => {
      clearModal.classList.remove('hidden');
    });
    
    document.getElementById('cancelClear').addEventListener('click', () => {
      clearModal.classList.add('hidden');
    });
    
    document.getElementById('confirmClear').addEventListener('click', () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
      clearModal.classList.add('hidden');
    });

    // Download
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'my-drawing.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') {
          e.preventDefault();
          if (e.shiftKey) {
            redo();
          } else {
            undo();
          }
        } else if (e.key === 'y') {
          e.preventDefault();
          redo();
        } else if (e.key === 's') {
          e.preventDefault();
          document.getElementById('downloadBtn').click();
        }
      }
    });

    // Initialize
    window.addEventListener('resize', resizeCanvas);
    
    // Element SDK initialization
    async function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      document.getElementById('app-title').textContent = config.app_title || defaultConfig.app_title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (value) => window.elementSdk.setConfig({ primary_color: value })
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['app_title', cfg.app_title || defaultConfig.app_title]
        ])
      });
    }

    // Initial resize
    setTimeout(() => {
      resizeCanvas();
    }, 100);
